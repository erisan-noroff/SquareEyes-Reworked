<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description"
          content="Browse our full collection of high-quality films handpicked to support independent filmmakers. Filter by genre and find your next favourite movie.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Eyes - Our Collection</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/scripts/header.js" defer></script>
    <script src="assets/scripts/footer.js" defer></script>
    <script src="assets/scripts/movies.js" type="module" defer></script>
    <script src="assets/scripts/movie-card-renderer.js" type="module" defer></script>
</head>
<body data-page="movies">
<header></header>
<main>
    <div class="page-wrapper">
        <section class="section-content">
            <div class="movies-section-header">
                <h1>Our collection</h1>
                <div class="movies-filter-wrapper">
                    <button type="button" class="btn btn-primary btn-movie-filter" id="movies-filter-toggle"
                            aria-label="Toggle filter drop-down menu"
                            aria-expanded="false" aria-controls="movies-filter-dropdown">
                        <span class="material-icons">filter_alt</span> Filter by genre
                    </button>
                    <div class="movies-filter-dropdown" id="movies-filter-dropdown" hidden>
                        <ul>
                            <li>
                                <button class="btn btn-filter btn-filter-active" type="button" data-filter="none">
                                    Show All
                                </button>
                            </li>
                            <li>
                                <button class="btn btn-filter" type="button" data-filter="action">Action</button>
                            </li>
                            <li>
                                <button class="btn btn-filter" type="button" data-filter="comedy">Comedy</button>
                            </li>
                            <li>
                                <button class="btn btn-filter" type="button" data-filter="drama">Drama</button>
                            </li>
                            <li>
                                <button class="btn btn-filter" type="button" data-filter="horror">Horror</button>
                            </li>
                            <li>
                                <button class="btn btn-filter" type="button" data-filter="kids">Kids</button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="card-grid" id="movies-container">
                <p id="loading">Fetching data, please wait...</p>
            </div>
        </section>
    </div>
</main>
<footer></footer>
</body>
</html>
