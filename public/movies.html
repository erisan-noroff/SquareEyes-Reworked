<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description"
          content="Browse our full collection of high-quality films handpicked to support independent filmmakers. Filter by genre and find your next favourite movie.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Eyes - Our Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Assistant:wght@300;400;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/scripts/movies.js" type="module" defer></script>
    <script src="assets/scripts/movie-card-renderer.js" type="module" defer></script>
</head>
<body data-page="movies">
<header></header>
<main>
    <div class="page-wrapper">
        <div class="section-header">
            <h1>Our Collection</h1>
            <button class="btn filter-toggle" id="filter-toggle" type="button" aria-label="Toggle filter drop-down menu"
                    aria-expanded="false" aria-controls="filter-dropdown">
                <!-- filter icon -->
                Filter by Genre
            </button>
        </div>
        <div class="filter-bar" id="filter-dropdown" hidden>
            <ul>
                <li>
                    <button type="button" data-filter="none">Show All</button>
                </li>
                <li>
                    <button type="button" data-filter="action">Action</button>
                </li>
                <li>
                    <button type="button" data-filter="comedy">Comedy</button>
                </li>
                <li>
                    <button type="button" data-filter="drama">Drama</button>
                </li>
                <li>
                    <button type="button" data-filter="horror">Horror</button>
                </li>
                <li>
                    <button type="button" data-filter="kids">Kids</button>
                </li>
            </ul>
        </div>
        <p id="loading">Loading movies...</p>
        <div class="card-grid" id="movies-container">
            <!-- Cards injected by JS -->
        </div>
    </div>
</main>
<footer></footer>
</body>
</html>
