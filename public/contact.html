<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description"
          content="Get in touch with Square Eyes for support or feedback. Contact us via email or phone, or send us a message through our contact form.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Eyes - Contact Us</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/scripts/header.js" defer></script>
    <script src="assets/scripts/footer.js" defer></script>
</head>
<body>
<header></header>
<main>
    <div class="page-wrapper">
        <section class="section-content contact-content-grid">
            <div class="contact-details text-wrapper">
                <h1>Get In Touch</h1>
                <div class="text-block">
                    <p class="contact-info-label">Questions or concerns?</p>
                    <p>Our customer service team is happy to help.</p>
                </div>
                <div>
                    <p>
                        <span class="contact-info-label">Email: </span>
                        <a class="link" href="mailto:support@squareeyes.com">support@squareeyes.com</a>
                    </p>
                    <p>
                        <span class="contact-info-label">Phone: </span>
                        <a class="link" href="tel:+4712345678">+47 123 45 678</a>
                    </p>
                </div>
                <div>
                    <p>Available Monday - Friday, 08:00 - 16:00</p>
                </div>
            </div>
            <div class="contact-form-content">
                <h2>Send us a message</h2>
                <form class="contact-form" id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input class="input-text input-regular" id="name" type="text"
                                   placeholder="John Doe" />
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input class="input-text input-regular" id="email" type="text"
                                   placeholder="name@example.com" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="message">Your message</label>
                        <textarea id="message" class="input-text input-area"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send message</button>
                </form>
            </div>
        </section>
    </div>
</main>
<footer></footer>
</body>
</html>
