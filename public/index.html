<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Discover unique, high-quality films handpicked to support independent filmmakers. Browse and buy movies at Square Eyes.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Eyes - Discover Independent Films</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/scripts/header.js" defer></script>
    <script src="assets/scripts/footer.js" defer></script>
    <script src="assets/scripts/index.js" type="module" defer></script>
    <script src="assets/scripts/movie-card-renderer.js" type="module" defer></script>
</head>
<body data-page="index">
<header></header>
<main>
    <section class="hero">
        <div class="image-overlay">
            <div class="hero-content">
                <p class="hero-eyebrow eyebrow">New arrivals this week</p>
                <h1 class="hero-headline">Cinema for the Curious Mind</h1>
                <p class="hero-sub">Rare, high-quality films — handpicked to support independent filmmakers and film lovers alike.</p>
                <button class="primary-button">Start Watching</button>
            </div>
        </div>
    </section>
    <div class="page-wrapper">
        <section class="section-content">
            <div class="top-rated-movies-section-header">
                <h2>Top Rated Movies</h2>
                <a class="link" href="movies.html">Explore our collection →</a>
            </div>
            <div class="card-grid" id="movies-container">
                <p id="loading">Fetching data, please wait...</p>
                <!-- Dynamically populated by JS -->
            </div>
        </section>
        <section class="section-content">
            <div class="promo-banner">
                <div class="promo-content">
                    <p class="eyebrow">Our full collection</p>
                    <h2>Hundreds of films.<br>One great price.</h2>
                    <a href="movies.html" class="primary-button">Start Watching</a>

            </div>
