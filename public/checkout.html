<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Complete your purchase securely and quickly. Enter your payment details to finalize your order.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Eyes - Contact Us</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/scripts/header.js" defer></script>
    <script src="assets/scripts/footer.js" defer></script>
    <script type="module" src="assets/scripts/order-summary.js" defer></script>
</head>

<body data-page="checkout">
<header></header>
<main>
    <div class="page-wrapper">
        <div class="checkout-content-grid">
            <section class="section-content">
                <h1>Checkout</h1>
                <form class="checkout-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input class="input-text input-regular" id="email" type="email"
                               placeholder="name@example.com" />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="card-number">Card number</label>
                            <input class="input-text input-regular" id="card-number" type="text"
                                   placeholder="1234 5678 9012 3456" />
                        </div>
                        <div class="form-group">
                            <label for="name-on-card">Name on card</label>
                            <input class="input-text input-regular" id="name-on-card" type="text"
                                   placeholder="John Doe" />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expiry-date">Expiry Date</label>
                            <input class="input-text input-regular" id="expiry-date" type="text"
                                   placeholder="MM/YY" />
                        </div>
                        <div class="form-group">
                            <label for="cvv">CVV</label>
                            <input class="input-text input-regular" id="cvv" type="text"
                                   placeholder="123" />
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </section>
            <aside class="order-summary">
                <div class="order-summary-header">
                    <h2>Order Summary</h2>
                </div>
                <div class="order-summary-item-rows"></div>
            </aside>
        </div>
    </div>
</main>
<footer></footer>
</body>
</html>
